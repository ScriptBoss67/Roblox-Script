<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Unlock Reward</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at top, #1a1f2b 0%, #0d1117 70%);
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        .tip-title {
            text-align: center;
            font-size: 15px;
            color: #ffcc00;
            margin-bottom: 15px;
        }

        .task-card {
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #30363d;
            padding: 20px;
            margin-top: 10px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }

        .task-card h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #fff;
            text-align: center;
        }

        .task-item {
            background: #21262d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid #30363d;
            transition: all 0.2s;
        }

        .task-item:hover {
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .task-item.completed {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
            cursor: default;
        }

        .task-item.lock {
            opacity: 0.35;
            pointer-events: none;
            cursor: not-allowed;
        }

        .task-item[disabled] {
            opacity: 0.7;
            pointer-events: none;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-icon {
            width: 40px;
            height: 40px;
            background: rgba(168, 85, 247, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a855f7;
            font-size: 20px;
        }

        .task-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
            color: #fff;
        }

        .task-info p {
            font-size: 13px;
            color: #8b949e;
        }

        .task-arrow {
            color: #8b949e;
            font-size: 18px;
        }

        .claim-btn {
            width: 100%;
            padding: 18px;
            background: repeating-linear-gradient(
                45deg,
                #21262d,
                #21262d 10px,
                #30363d 10px,
                #30363d 20px
            );
            border: none;
            border-radius: 8px;
            color: #8b949e;
            font-size: 16px;
            font-weight: 600;
            cursor: not-allowed;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .claim-btn.unlocked {
            background: linear-gradient(90deg, #a855f7, #6366f1);
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tip-title">Each task requires staying for 10 seconds to complete</div>

        <div class="task-card">
            <h2>Complete Tasks to Continue</h2>

            <div class="task-item" id="task1" onclick="doTask(0)">
                <div class="task-left">
                    <div class="task-icon">✦</div>
                    <div class="task-info">
                        <h3>Follow Account</h3>
                        <p id="txt1">Stay 10 seconds then return</p>
                    </div>
                </div>
                <span class="task-arrow">➔</span>
            </div>

            <div class="task-item lock" id="task2" onclick="doTask(1)">
                <div class="task-left">
                    <div class="task-icon">✦</div>
                    <div class="task-info">
                        <h3>Watch Video</h3>
                        <p id="txt2">Watch until the end</p>
                    </div>
                </div>
                <span class="task-arrow">➔</span>
            </div>

            <div class="task-item lock" id="task3" onclick="doTask(2)">
                <div class="task-left">
                    <div class="task-icon">✦</div>
                    <div class="task-info">
                        <h3>Like Video</h3>
                        <p id="txt3">Like the latest video</p>
                    </div>
                </div>
                <span class="task-arrow">➔</span>
            </div>

            <div class="task-item lock" id="task4" onclick="doTask(3)">
                <div class="task-left">
                    <div class="task-icon">✦</div>
                    <div class="task-info">
                        <h3>Comment Video</h3>
                        <p id="txt4">Leave a comment below</p>
                    </div>
                </div>
                <span class="task-arrow">➔</span>
            </div>

            <button class="claim-btn" id="rewardBtn" disabled>🔒 Get Reward</button>
        </div>
    </div>

    <script>
        // 你的视频链接
        const VIDEO_LINK = "Paste your latest TikTok video link here";
        // TikTok主页
        const PROFILE_LINK = "https://www.tiktok.com/@scriptboss67";
        // 跳转脚本主页
        const HOME_LINK = "https://scriptboss67.github.io/Roblox-Script/";

        const tasks = document.querySelectorAll(".task-item");
        const texts = [
            document.getElementById("txt1"),
            document.getElementById("txt2"),
            document.getElementById("txt3"),
            document.getElementById("txt4")
        ];
        const rewardBtn = document.getElementById("rewardBtn");

        let nowTask = 0;

        function doTask(index) {
            // 只能按顺序做任务
            if (index !== nowTask || tasks[index].classList.contains("completed")) return;

            let link = index === 0 ? PROFILE_LINK : VIDEO_LINK;
            window.open(link, "_blank");

            let count = 10;
            texts[index].innerText = `Waiting: ${count}s`;
            tasks[index].style.pointerEvents = "none";

            const timer = setInterval(() => {
                count--;
                texts[index].innerText = `Waiting: ${count}s`;

                if (count <= 0) {
                    clearInterval(timer);
                    // 任务完成
                    tasks[index].classList.add("completed");
                    texts[index].innerText = "Completed";
                    nowTask++;

                    // 解锁下一个任务
                    if (nowTask < tasks.length) {
                        tasks[nowTask].classList.remove("lock");
                        tasks[nowTask].style.pointerEvents = "auto";
                    }

                    // 全部完成 解锁奖励
                    if (nowTask >= tasks.length) {
                        rewardBtn.disabled = false;
                        rewardBtn.classList.add("unlocked");
                        rewardBtn.innerText = "✅ Get Reward";
                    }
                }
            }, 1000);
        }

        rewardBtn.addEventListener("click", () => {
            location.href = HOME_LINK;
        });
    </script>
</body>
</html>
